info:
  name: Create a competitor
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/{{api}}/competitors"
  body:
    type: json
    data: |-
      {
        "name": "{{$randomFullName}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
